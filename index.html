<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyRuKo Pro - Powered by Vue.js</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-200">

    <div id="app" class="min-h-screen flex flex-col items-center py-12 px-6">
        
        <div v-if="!loaded" class="animate-pulse text-emerald-500">
            Menyiapkan Ruko Anda...
        </div>

        <div v-else class="max-w-xl w-full">
            
            <header class="text-center mb-10">
                <span class="px-4 py-1 rounded-full text-xs font-bold border" :style="{ borderColor: config.tema_warna, color: config.tema_warna }">
                    {{ config.nama_toko }}
                </span>
                <h1 class="text-4xl font-black text-white mt-4 leading-tight">
                    {{ config.hero_title }}
                </h1>
            </header>

            <div class="bg-white/5 backdrop-blur-lg border border-white/10 rounded-3xl p-8 mb-8 shadow-2xl">
                <h3 class="text-xl font-bold mb-6 italic text-emerald-400">Kenapa Harus MyRuKo?</h3>
                <ul class="space-y-4">
                    <li v-for="item in config.fitur" :key="item" class="flex items-center">
                        <svg class="w-5 h-5 mr-3 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                        </svg>
                        {{ item }}
                    </li>
                </ul>
            </div>

            <div class="text-center">
                <p class="text-gray-400 mb-2 italic">Investasi Sekali Bayar</p>
                <div class="text-5xl font-black text-white mb-8">Rp {{ config.harga }}</div>
                
                <button @click="beliSekarang" 
                    class="w-full py-5 rounded-2xl font-bold text-xl text-white shadow-lg transition-transform active:scale-95"
                    :style="{ backgroundColor: config.tema_warna }">
                    AMANKAN SLOT RUKO SAYA
                </button>
            </div>

        </div>
    </div>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const config = ref({});
                const loaded = ref(false);

                // Mengambil data dari JSON secara otomatis
                onMounted(async () => {
                    try {
                        const response = await fetch('config.json');
                        config.value = await response.json();
                        loaded.value = true;
                    } catch (error) {
                        console.error("Gagal memuat konfigurasi:", error);
                    }
                });

                const beliSekarang = () => {
                    const pesan = `Halo ${config.value.nama_toko}, saya ingin beli Lisensi Pro seharga ${config.value.harga}`;
                    window.location.href = `https://wa.me/${config.value.whatsapp}?text=${encodeURIComponent(pesan)}`;
                };

                return { config, loaded, beliSekarang };
            }
        }).mount('#app');
    </script>
</body>
</html>
